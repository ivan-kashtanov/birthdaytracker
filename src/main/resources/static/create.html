<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить день рождения</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>➕ Добавить день рождения</h1>
    </header>

    <nav class="menu">
        <a href="index.html">Главная</a>
        <a href="all.html">Все дни рождения</a>
        <a href="create.html" class="active">Добавить ДР</a>
    </nav>

    <form id="create-form" class="form">
        <div class="form-group">
            <label>Полное имя:</label>
            <input type="text" id="fullName" required>
        </div>

        <div class="form-group">
            <label>Дата рождения:</label>
            <input type="date" id="birthday" required>
        </div>

        <div class="form-group">
            <label>Email (необязательно):</label>
            <input type="email" id="email">
        </div>

        <div class="form-group">
            <label>Фото (необязательно):</label>
            <input type="file" id="photo" accept="image/*">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Сохранить</button>
            <button type="button" onclick="window.history.back()" class="btn btn-gray">Отмена</button>
        </div>

        <div id="message"></div>
    </form>
</div>

<script>
    document.getElementById('create-form').addEventListener('submit', async function(e) {
        e.preventDefault();

        const personData = {
            fullName: document.getElementById('fullName').value,
            birthday: document.getElementById('birthday').value,
            email: document.getElementById('email').value || null
        };

        const photoFile = document.getElementById('photo').files[0];
        const formData = new FormData();

        formData.append('person', new Blob([JSON.stringify(personData)], {
            type: 'application/json'
        }));

        if (photoFile) {
            formData.append('photo', photoFile);
        }

        try {
            const response = await fetch('/api/birthdays/create', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                document.getElementById('message').innerHTML =
                    '<p class="success">Запись успешно создана!</p>';
                document.getElementById('create-form').reset();

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                document.getElementById('message').innerHTML =
                    '<p class="error">Ошибка при создании записи</p>';
            }
        } catch (error) {
            document.getElementById('message').innerHTML =
                '<p class="error">Ошибка соединения</p>';
        }
    });
</script>
</body>
</html>
