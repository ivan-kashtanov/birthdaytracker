version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: birthdaytracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data/photos:/data/photos
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/birthdaytracker
    depends_on:
      - postgres

volumes:
  postgres_data: